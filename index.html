<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure BCI Thought-to-Text Pipeline</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #monitor { position: absolute; bottom: 50px; right: 50px; width: 300px; height: 150px; 
                   background: rgba(0,20,20,0.9); border: 2px solid #00ffcc; padding: 15px; }
        .data-stream { color: #fff; font-size: 12px; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>NEURAL-SECURE DECODER</h1>
        <p>Status: <span id="status">Waiting for EEG...</span></p>
    </div>
    <div id="monitor">
        <strong>DECODED THOUGHT:</strong>
        <div id="thought-output" class="data-stream">Initializing neural link...</div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({canvas: document.querySelector('#canvas'), antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Nodes
        const createNode = (x, color, label) => {
            const mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(0.8, 2), new THREE.MeshPhongMaterial({color, wireframe: true}));
            mesh.position.x = x;
            scene.add(mesh);
            return mesh;
        };

        const nodes = [
            createNode(-6, 0x00ffcc, "Sensor"),
            createNode(-2, 0xff00ff, "Encryption"),
            createNode(2, 0x4444ff, "DL Inference"),
            createNode(6, 0xffff00, "Output")
        ];

        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(0, 5, 5);
        scene.add(light, new THREE.AmbientLight(0x404040));
        camera.position.z = 12;

        // Animate Data Flow
        function runPipeline() {
            document.getElementById('status').innerText = "Analyzing Neural Intent...";
            nodes.forEach((node, i) => {
                gsap.to(node.rotation, {y: Math.PI * 2, duration: 1.5, delay: i * 0.5});
                gsap.to(node.scale, {x: 1.5, y: 1.5, z: 1.5, yoyo: true, repeat: 1, duration: 0.5, delay: i * 0.5});
            });

            setTimeout(() => {
                document.getElementById('thought-output').innerText = ">> 'I am ready to communicate.'";
                document.getElementById('status').innerText = "Prediction Complete.";
            }, 3000);
        }

        window.addEventListener('click', runPipeline);
        
        function animate() {
            requestAnimationFrame(animate);
            nodes.forEach(n => n.rotation.x += 0.005);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
